name: Build and Save JAR

# Kiedy uruchamiamy? Przy każdym pushu i pull requeście
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-jar:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Instalacja Javy (upewnij się, że używacie wersji 17, jeśli inna - zmień)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Zbudowanie pliku JAR za pomocą Mavena (pomijamy testy dla przyspieszenia)
    - name: Build JAR with Maven
      run: mvn -B clean package -DskipTests

    # 4. Zapisanie wygenerowanego pliku JAR na GitHubie jako artefakt
    - name: Upload JAR as artifact
      uses: actions/upload-artifact@v3
      with:
        name: text-transformer-app
        # Maven standardowo wrzuca zbudowane pliki JAR do folderu 'target'
        path: target/*.jar
