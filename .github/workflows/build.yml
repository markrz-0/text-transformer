name: Build, Tag, and Release (JAR & Docs)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Read version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build JAR and Javadocs
        run: mvn -B clean package javadoc:javadoc javadoc:jar

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: text-transformer-app-${{ steps.get_version.outputs.CURRENT_VERSION }}
          path: target/*.jar
          retention-days: 7

      - name: Upload HTML Documentation for download
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-documentation
          path: target/site/apidocs/
          retention-days: 7

      - name: Create and Push Git Tag
        id: tag_repo
        if: github.event_name == 'push' && !contains(steps.get_version.outputs.CURRENT_VERSION, 'SNAPSHOT')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAG_NAME="v${{ steps.get_version.outputs.CURRENT_VERSION }}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping tagging."
            echo "TAG_CREATED=false" >> $GITHUB_OUTPUT # <-- Report that we skipped
          else
            echo "Tagging repository with $TAG_NAME"
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
            git push origin "$TAG_NAME"
            echo "TAG_CREATED=true" >> $GITHUB_OUTPUT # <-- Report that we succeeded
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push' && !contains(steps.get_version.outputs.CURRENT_VERSION, 'SNAPSHOT') && steps.tag_repo.outputs.TAG_CREATED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.CURRENT_VERSION }}
          name: Release v${{ steps.get_version.outputs.CURRENT_VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            target/*.jar